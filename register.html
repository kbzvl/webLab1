<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація користувача -  Телефонний довідник</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
    </style>
</head>
<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="index.html">
                    <i class="bi bi-journal-bookmark-fill"></i> Довідник KV-32
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="index.html">Довідник</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="profile.html">Профіль</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="about.html">Про додаток</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="login.html">Вхід</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="register.html">Реєстрація</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-light text-center py-3">
                        <h2 class="mb-0 fs-4">Реєстрація користувача</h2>
                    </div>
                    <div class="card-body p-4">
                        <form>
                            <div class="mb-3">
                                <label for="regName" class="form-label">Ім'я</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" id="regName" placeholder="Введіть ваше ім'я" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="regEmail" class="form-label">Електронна пошта (Email)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control" id="regEmail" placeholder="name@example.com" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Стать</label>
                                <div class="d-flex gap-3 pt-1">
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="genderRadio" id="genderMale" value="male" checked>
                                        <label class="form-check-label" for="genderMale">Чоловіча</label>
                                    </div>
                                    <div class="form-check">
                                        <input class="form-check-input" type="radio" name="genderRadio" id="genderFemale" value="female">
                                        <label class="form-check-label" for="genderFemale">Жіноча</label>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label for="regBirthdate" class="form-label">Дата народження</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-calendar3"></i></span>
                                    <input type="date" class="form-control" id="regBirthdate" required>
                                </div>
                            </div>

                            <button type="button" class="btn btn-success w-100 py-2">Зареєструватися</button>
                        </form>
                        <div class="text-center mt-3">
                            <span class="text-muted">Вже маєте акаунт?</span> <a href="login.html" class="text-decoration-none">Увійти</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white text-center py-3">
        <div class="container">
            <p class="mb-0">&copy; 2026 Телефонний довідник. Розробив студент групи КВ-32 Кобзарь Владислав.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
